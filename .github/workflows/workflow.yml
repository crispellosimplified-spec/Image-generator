name: Gemini Image Generator

on:
  push:
    paths: ["prompts.txt"]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  key1:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install google-genai -q
      - name: Run Key 1
        env:
          GEMINI_KEY_1: ${{ secrets.GEMINI_KEY_1 }}
          KEY_ID: "1"
        run: python generate.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: images-key1
          path: output/
          retention-days: 30

  key2:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install google-genai -q
      - name: Run Key 2
        env:
          GEMINI_KEY_2: ${{ secrets.GEMINI_KEY_2 }}
          KEY_ID: "2"
        run: python generate.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: images-key2
          path: output/
          retention-days: 30
